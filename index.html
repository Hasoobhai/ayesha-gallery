<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayesha Rehman Kiani Gallery</title>
  <style>
    :root {
      --pink: #ff6b9d;
      --light-pink: #ffc0cb;
      --rose: #8f1438;
      --blue: #14275c;
      --green: #174a35;
      --gold: #ffd700;
      --bg: #fff5f7;
      --text: #333333;
      --shadow: 0 18px 55px rgba(143, 20, 56, 0.18);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 192, 203, 0.55), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(255, 215, 0, 0.18), transparent 24%),
        linear-gradient(135deg, #fff5f7 0%, #fff 48%, #ffe6ee 100%);
      font-family: "Poppins", "Montserrat", "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -60px;
      width: 18px;
      height: 18px;
      transform: rotate(45deg);
      background: rgba(255, 107, 157, 0.5);
      animation: floatHeart linear infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: inherit;
    }

    .heart::before { left: -9px; top: 0; }
    .heart::after { top: -9px; left: 0; }

    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(45deg) scale(0.75); opacity: 0; }
      12% { opacity: 0.78; }
      100% { transform: translateY(-112vh) rotate(45deg) scale(1.25); opacity: 0; }
    }

    header {
      min-height: 94vh;
      display: grid;
      place-items: center;
      padding: 34px 18px 78px;
      position: relative;
      isolation: isolate;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: -1;
      background-image: linear-gradient(rgba(143, 20, 56, 0.22), rgba(255, 245, 247, 0.94)), url("assets/photos/photo-01.jpeg");
      background-size: cover;
      background-position: center 28%;
      background-attachment: fixed;
      transform: scale(1.02);
    }

    .hero {
      width: min(1040px, 100%);
      text-align: center;
      color: white;
      padding-top: 10vh;
      text-shadow: 0 5px 24px rgba(70, 8, 30, 0.45);
    }

    .eyebrow {
      display: inline-flex;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.17);
      backdrop-filter: blur(10px);
      animation: fadeUp 0.8s ease both;
    }

    h1, h2, h3 {
      font-family: "Dancing Script", "Great Vibes", "Brush Script MT", cursive;
      font-weight: 700;
      letter-spacing: 0;
      margin: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: clamp(3.6rem, 12vw, 9rem);
      line-height: 0.88;
      animation: fadeUp 1s ease 0.18s both;
    }

    .hero-actions {
      margin-top: 34px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      animation: fadeUp 1s ease 0.55s both;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 20px;
      background: linear-gradient(135deg, var(--pink), var(--rose));
      color: white;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(143, 20, 56, 0.26);
      text-decoration: none;
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(10px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    section { padding: 82px 18px; }
    .wrap { width: min(1160px, 100%); margin: 0 auto; }

    .section-title {
      text-align: center;
      margin-bottom: 42px;
    }

    .section-title h2 {
      color: var(--rose);
      font-size: clamp(2.7rem, 7vw, 5.4rem);
    }

    .section-title p {
      max-width: 720px;
      margin: 12px auto 0;
      line-height: 1.8;
      color: #5f3645;
      font-size: 1.05rem;
    }

    .memory-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-top: -42px;
      margin-bottom: 48px;
    }

    .mini-card {
      padding: 18px 14px;
      border: 1px solid rgba(255, 215, 0, 0.5);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 12px 30px rgba(143, 20, 56, 0.1);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .mini-card strong {
      display: block;
      color: var(--rose);
      font-size: 1.25rem;
    }

    .mini-card span {
      display: block;
      margin-top: 6px;
      color: #674153;
      font-size: 0.88rem;
    }

    .gallery,
    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .photo-card,
    .video-card {
      border-radius: 8px;
      background: white;
      border: 2px solid rgba(255, 215, 0, 0.55);
      box-shadow: var(--shadow);
      overflow: hidden;
      transform: translateY(24px);
      opacity: 0;
      transition: transform 0.5s ease, opacity 0.5s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .photo-card { cursor: pointer; }
    .photo-card.visible,
    .video-card.visible,
    .reveal.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .photo-card:hover,
    .video-card:hover {
      transform: translateY(-8px);
      border-color: var(--gold);
      box-shadow: 0 22px 70px rgba(143, 20, 56, 0.26);
    }

    .photo-frame,
    .video-frame {
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: #ffe3eb;
    }

    .photo-frame img,
    .video-frame video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.7s ease, filter 0.4s ease;
    }

    .photo-card:hover img {
      transform: scale(1.075);
      filter: saturate(1.06) contrast(1.03);
    }

    .videos {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 245, 247, 0.9));
    }

    .video-frame video { background: #1c0812; }

    footer {
      padding: 34px 18px 118px;
      text-align: center;
      color: #623044;
      background: rgba(255, 255, 255, 0.5);
    }

    .player {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      width: min(360px, calc(100vw - 36px));
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 215, 0, 0.56);
      box-shadow: 0 18px 48px rgba(68, 12, 31, 0.22);
      padding: 14px;
      backdrop-filter: blur(16px);
    }

    .player-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .player-buttons {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 0;
      cursor: pointer;
      background: linear-gradient(135deg, var(--pink), var(--rose));
      color: white;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(143, 20, 56, 0.22);
      position: relative;
    }

    .play-icon::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 11px;
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 12px solid white;
    }

    .play-icon.is-playing::before,
    .play-icon.is-playing::after {
      content: "";
      position: absolute;
      top: 10px;
      width: 5px;
      height: 18px;
      background: white;
      border: 0;
    }

    .play-icon.is-playing::before { left: 12px; }
    .play-icon.is-playing::after { right: 12px; }

    .mute-icon::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 13px;
      width: 10px;
      height: 12px;
      background: white;
      clip-path: polygon(0 30%, 42% 30%, 100% 0, 100% 100%, 42% 70%, 0 70%);
    }

    .mute-icon::after {
      content: "";
      position: absolute;
      right: 9px;
      top: 11px;
      width: 8px;
      height: 16px;
      border-right: 2px solid white;
      border-radius: 50%;
    }

    .mute-icon.is-muted::after {
      right: 10px;
      top: 10px;
      width: 18px;
      height: 18px;
      border: 0;
      border-top: 3px solid white;
      transform: rotate(45deg);
      border-radius: 0;
    }

    .volume {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: #694354;
      font-size: 0.85rem;
    }

    input[type="range"] { width: 100%; accent-color: var(--pink); }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(28, 8, 18, 0.86);
      backdrop-filter: blur(8px);
    }

    .lightbox.open {
      display: grid;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .lightbox-inner {
      width: min(960px, 100%);
      color: white;
      text-align: center;
      position: relative;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 78vh;
      object-fit: contain;
      border-radius: 8px;
      border: 2px solid var(--gold);
      box-shadow: 0 18px 70px rgba(0, 0, 0, 0.42);
      background: white;
    }

    .lightbox p {
      line-height: 1.7;
      margin: 14px auto 0;
      max-width: 760px;
    }

    .close,
    .nav {
      position: absolute;
      border: 0;
      cursor: pointer;
      color: white;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.3rem;
    }

    .close { top: -8px; right: -8px; }
    .close::before,
    .close::after {
      content: "";
      position: absolute;
      left: 13px;
      top: 20px;
      width: 18px;
      height: 3px;
      background: white;
    }
    .close::before { transform: rotate(45deg); }
    .close::after { transform: rotate(-45deg); }
    .nav { top: 45%; transform: translateY(-50%); }
    .prev { left: -8px; }
    .next { right: -8px; }
    .prev::before,
    .next::before {
      content: "";
      position: absolute;
      top: 14px;
      width: 14px;
      height: 14px;
      border-left: 3px solid white;
      border-bottom: 3px solid white;
    }
    .prev::before { left: 17px; transform: rotate(45deg); }
    .next::before { right: 17px; transform: rotate(225deg); }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    @media (max-width: 880px) {
      .gallery,
      .video-grid { grid-template-columns: 1fr; }

      .memory-strip {
        grid-template-columns: repeat(2, 1fr);
        margin-top: 0;
      }

      .hero-bg { background-attachment: scroll; }
      header { min-height: 92vh; }
    }

    @media (max-width: 520px) {
      section { padding: 64px 14px; }
      .memory-strip { grid-template-columns: 1fr; }
      .hero { padding-top: 8vh; }
      .player { left: 12px; right: 12px; bottom: 12px; width: auto; }
      .nav { top: auto; bottom: -58px; }
      .prev { left: 35%; }
      .next { right: 35%; }
      .close { top: -54px; right: 0; }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <header id="top">
    <div class="hero-bg"></div>
    <div class="hero">
      <div class="eyebrow">Ayesha Rehman Kiani Gallery</div>
      <h1>Ayesha Rehman Kiani</h1>
      <div class="hero-actions">
        <a class="btn" href="#gallery">Tumhari Tasveerein</a>
        <a class="btn secondary" href="#videos">Tumhari Videos</a>
      </div>
    </div>
  </header>

  <main>
    <section>
      <div class="wrap">
        <div class="memory-strip reveal">
          <div class="mini-card"><strong>Ayesham</strong><span>Gallery profile</span></div>
          <div class="mini-card"><strong>17 September</strong><span>Birthday</span></div>
          <div class="mini-card"><strong>Centaurus x 2</strong><span>Visit memories</span></div>
          <div class="mini-card"><strong>Chunks</strong><span>Favourite food</span></div>
          <div class="mini-card"><strong>Dark Red, Blue, Green</strong><span>Favourite colors</span></div>
        </div>
      </div>
    </section>

    <section id="gallery">
      <div class="wrap">
        <div class="section-title reveal">
          <h2>Tumhari Tasveerein</h2>
        </div>
        <div class="gallery" id="galleryGrid"></div>
      </div>
    </section>

    <section class="videos" id="videos">
      <div class="wrap">
        <div class="section-title reveal">
          <h2>Tumhari Videos</h2>
        </div>
        <div class="video-grid" id="videoGrid"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>Ayesham | Gulum | Induction Chulha | Chashmish</p>
  </footer>

  <div class="player" aria-label="Music player">
    <div class="player-top">
      <div class="player-buttons">
        <button class="icon-btn play-icon" id="playBtn" aria-label="Play ya pause"></button>
        <button class="icon-btn mute-icon" id="muteBtn" aria-label="Mute ya unmute"></button>
      </div>
    </div>
    <div class="volume">
      <input id="volume" type="range" min="0" max="1" step="0.01" value="0.55" />
    </div>
  </div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-inner">
      <button class="close" id="closeLightbox" aria-label="Band karo"></button>
      <button class="nav prev" id="prevPhoto" aria-label="Pichli tasveer"></button>
      <img id="lightboxImage" alt="Ayesham ki tasveer" />
      <button class="nav next" id="nextPhoto" aria-label="Agli tasveer"></button>
    </div>
  </div>

  <audio id="audio" loop preload="auto" autoplay src="assets/song/heeriye.webm"></audio>

  <script>
    const photos = Array.from({ length: 55 }, (_, i) => ({
      src: `assets/photos/photo-${String(i + 1).padStart(2, "0")}.jpeg`,
      name: `Photo ${i + 1}`
    }));

    const videos = Array.from({ length: 12 }, (_, i) => ({
      src: `assets/videos/video-${String(i + 1).padStart(2, "0")}.mp4`,
      poster: photos[i % photos.length].src,
      name: `Video ${i + 1}`
    }));

    const gallery = document.getElementById("galleryGrid");
    photos.forEach((photo, index) => {
      const card = document.createElement("article");
      card.className = "photo-card reveal";
      card.innerHTML = `<div class="photo-frame"><img loading="lazy" src="${photo.src}" alt="${photo.name}"></div>`;
      card.addEventListener("click", () => openLightbox(index));
      gallery.appendChild(card);
    });

    const videoGrid = document.getElementById("videoGrid");
    videos.forEach((video) => {
      const card = document.createElement("article");
      card.className = "video-card reveal";
      card.innerHTML = `<div class="video-frame"><video controls preload="metadata" poster="${video.poster}" playsinline src="${video.src}"></video></div>`;
      videoGrid.appendChild(card);
    });

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.14 });

    document.querySelectorAll(".reveal, .photo-card, .video-card").forEach((el, i) => {
      el.style.transitionDelay = `${Math.min(i * 35, 350)}ms`;
      revealObserver.observe(el);
    });

    const hearts = document.getElementById("hearts");
    for (let i = 0; i < 30; i++) {
      const h = document.createElement("span");
      h.className = "heart";
      h.style.left = `${Math.random() * 100}%`;
      h.style.animationDuration = `${7 + Math.random() * 8}s`;
      h.style.animationDelay = `${Math.random() * 8}s`;
      h.style.opacity = `${0.35 + Math.random() * 0.45}`;
      h.style.width = h.style.height = `${12 + Math.random() * 14}px`;
      hearts.appendChild(h);
    }

    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const muteBtn = document.getElementById("muteBtn");
    const volume = document.getElementById("volume");
    audio.volume = Number(volume.value);

    function syncPlayer() {
      playBtn.classList.toggle("is-playing", !audio.paused);
      muteBtn.classList.toggle("is-muted", audio.muted);
    }

    async function tryPlay() {
      try {
        await audio.play();
      } catch (error) {
      }
      syncPlayer();
    }

    playBtn.addEventListener("click", () => audio.paused ? tryPlay() : audio.pause());
    muteBtn.addEventListener("click", () => {
      audio.muted = !audio.muted;
      syncPlayer();
    });
    volume.addEventListener("input", () => {
      audio.volume = Number(volume.value);
      if (audio.volume > 0) audio.muted = false;
      syncPlayer();
    });
    audio.addEventListener("play", syncPlayer);
    audio.addEventListener("pause", syncPlayer);
    window.addEventListener("load", tryPlay);
    document.addEventListener("click", () => {
      if (audio.paused) tryPlay();
    }, { once: true });

    document.querySelectorAll("video").forEach((video) => {
      video.addEventListener("play", () => {
        if (!audio.paused) audio.volume = Math.min(audio.volume, 0.18);
      });
      video.addEventListener("pause", () => {
        audio.volume = Number(volume.value);
      });
      video.addEventListener("ended", () => {
        audio.volume = Number(volume.value);
      });
    });

    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    let current = 0;

    function openLightbox(index) {
      current = index;
      lightboxImage.src = photos[current].src;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
    }

    function movePhoto(step) {
      openLightbox((current + step + photos.length) % photos.length);
    }

    document.getElementById("closeLightbox").addEventListener("click", closeLightbox);
    document.getElementById("prevPhoto").addEventListener("click", () => movePhoto(-1));
    document.getElementById("nextPhoto").addEventListener("click", () => movePhoto(1));
    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", (event) => {
      if (!lightbox.classList.contains("open")) return;
      if (event.key === "Escape") closeLightbox();
      if (event.key === "ArrowLeft") movePhoto(-1);
      if (event.key === "ArrowRight") movePhoto(1);
    });
  </script>
</body>
</html>
